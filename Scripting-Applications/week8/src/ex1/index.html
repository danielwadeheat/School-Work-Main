<!doctype html>
<html lang="en">
  <head>
    <meta name="keywords" content="school work, homework, web development, HTML, CSS, JavaScript, coding">
    <meta name="description" content="Francis Tuttle coursework for Week 8, Exercise 1. This page contains assignment work and outputs.">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Week 8 Assignment 1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Exercise 1: Add/Edit Form</h1>

      <p id="status" class="status" aria-live="polite"></p>

      <section id="listView">
        <button id="addBtn">+ Add Item</button>
        <ul id="list" class="list"></ul>
      </section>

      <section id="formView" class="hidden">
        <form id="itemForm" novalidate>
          <label>
            Name
            <input name="name" required minlength="2" />
          </label>
          <p id="errName" class="error" role="alert"></p>

          <label>
            Price
            <input name="price" type="number" required step="0.01" />
          </label>
          <p id="errPrice" class="error" role="alert"></p>

          <label>
            Category
            <select name="category" required>
              <option value="">Select one…</option>
              <option>Home</option>
              <option>Outdoors</option>
              <option>Accessories</option>
              <option>Electronics</option>
            </select>
          </label>
          <p id="errCategory" class="error" role="alert"></p>

          <button id="saveBtn" type="submit">Save</button>
          <button id="cancelBtn" type="button">Cancel</button>
        </form>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
