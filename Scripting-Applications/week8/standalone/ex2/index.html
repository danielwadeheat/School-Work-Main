  <body>
    <main class="page">
      <h1>Exercise 2: Speed Touches (Standalone)</h1>
      <p class="muted">Images use loading="lazy" with fixed dimensions.</p>

      <div class="grid">
        <figure>
          <img src="https://picsum.photos/id/1018/640/400" alt="Mountain" loading="lazy" width="640" height="400" />
          <figcaption>Mountain</figcaption>
        </figure>
        <figure>
          <img src="https://picsum.photos/id/1011/640/400" alt="Forest" loading="lazy" width="640" height="400" />
          <figcaption>Forest</figcaption>
        </figure>
        <figure>
          <img src="https://picsum.photos/id/1016/640/400" alt="Ocean" loading="lazy" width="640" height="400" />
          <figcaption>Ocean</figcaption>
        </figure>
      </div>
    </main>
    <script src="main.js"></script>
