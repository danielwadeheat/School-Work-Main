<body>

    <header>
        <div class="header-inner">
            <img src="images/DWH_logo.png" alt="Logo with the initials DWH">
            <nav>
                <a href="index.html">Home</a>
                <a href="about-page.html">About</a>
                <a href="projects-page.html">Projects</a>
                <a href="resume-page.html">Resume</a>
                <a href="contact-page.html">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact">
            <h2>Contact Me</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required placeholder="Your First and Last Name">

                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890">
                
                <label for="email">E-Mail:</label>
                <input type="email" id="email" name="email" required placeholder="Your E-Mail">

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required placeholder="What is on your mind?"></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <small>&copy 2025 Daniel Wade Heatherly. All rights reserved.</small>
        <small><a href="Contact-Page.html">Contact</a></small>
    </footer>

<script src="script.js"></script>

</body>
