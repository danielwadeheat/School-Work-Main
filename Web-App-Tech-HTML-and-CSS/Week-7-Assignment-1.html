<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Week 7 Assignment 1</title>
    <meta name="description" content="This is my Francis Turtle Week 7 1st Assignment."> 
    <meta name="keywords" content="school work, homework, web development, HTML, CSS, coding"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      /* Base styles (mobile-first) */
      body {
        font-family: Arial, sans-serif;
        font-size: 1rem;
        margin: 0;
        padding: 0;
        line-height: 1.6;
      }

      h1 {
        font-size: 2em;
        text-align: center;
        margin-top: 20px;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 15px;
      }

      /* Flexbox Layout */
      .flex-container {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
      }

      .flex-item {
        flex: 1 1 200px;
        background-color: #e0f7fa;
        padding: 20px;
        box-sizing: border-box;
        border-radius: 8px;
      }

      /* Grid Layout */
      .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .grid-item {
        background-color: #f0f0f0;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
        border-radius: 10px;
      }

      /* Mobile Styles */
      @media only screen and (max-width: 400px) {
        body {
          font-size: 0.875rem;
        }
      }

      /* Tablet Styles */
      @media only screen and (min-width: 401px) and (max-width: 960px) {
        .flex-item {
          flex: 1 1 48%;
        }
      }

      /* Desktop Styles */
      @media only screen and (min-width: 961px) {
        .flex-item {
          flex: 1 1 30%;
        }
      }

      /* Container width changes at breakpoints (Mobile-First) */
      @media only screen and (min-width: 768px) {
        .container {
          width: 750px;
        }
      }

      @media only screen and (min-width: 1024px) {
        .container {
          width: 960px;
        }
      }
    </style>
  </head>
  
<body>

<div class="container">
  <h1>Responsive Web Design Demo</h1>

  <div class="flex-container">
    <div class="flex-item">Column 1</div>
    <div class="flex-item">Column 2</div>
    <div class="flex-item">Column 3</div>
  </div>

  <div class="grid-container">
    <div class="grid-item">
      <p>Responsive Image:</p>
      <img 
        srcset="https://via.placeholder.com/500 500w,
                https://via.placeholder.com/1000 1000w,
                https://via.placeholder.com/2000 2000w"
        sizes="(max-width: 600px) 500px,
                (max-width: 1200px) 1000px,
                2000px"
        src="https://via.placeholder.com/1000"
        alt="Responsive Example Image" />
    </div>
    <div class="grid-item">Grid Item 2</div>
    <div class="grid-item">Grid Item 3</div>
  </div>
</div>

</body>
</html>

Objective: Learn how to modify a fixed-width layout to become responsive.
Instructions:
1. Provide a webpage with a fixed-width layout.

Fluid Grids: 
Using relative units like percentages instead of fixed units like pixels for layout elements.

.container {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

.column {
  width: 33.33%;
  float: left;
  padding: 15px;
}

Flexible Images:
Ensuring that images scale with the layout.

img {
  max-width: 100%;
  height: auto;
}

2. Use media queries to modify the layout for different screen sizes (mobile, tablet, desktop).

CSS techniques to apply different styles for different viewport sizes.

/* Mobile Styles */
@media only screen and (max-width: 400px) {
  body {
    font-size: 14px;
  }
}

/* Tablet Styles */
@media only screen and (min-width: 401px) and (max-width: 960px) {
  .column {
    width: 50%;
  }
}

/* Desktop Styles */
@media only screen and (min-width: 961px) {
  .column {
    width: 33.33%;
  }
}

Viewport Meta Tag
This tag ensures that the viewport is set to the width of the device, which is crucial for responsive design.

<meta name="viewport" content="width=device-width, initial-scale=1.0">

Responsive Typography
Using relative units for font sizes to ensure readability across devices.

body {
  font-size: 16px;
}

h1 {
  font-size: 2em; /* 32px/16px = 2em */
}

@media only screen and (max-width: 768px) {
  body {
    font-size: 14px;
  }
}
Flexbox for Responsive Layouts
Flexbox is a powerful tool for creating flexible, responsive layouts.

.flex-container {
  display: flex;
  flex-wrap: wrap;
}

.flex-item {
  flex: 1 1 200px; /* grow | shrink | basis */
  margin: 10px;
}

@media only screen and (max-width: 600px) {
  .flex-item {
    flex: 1 1 100%;
  }
}
CSS Grid for Responsive Layouts
CSS Grid provides even more control for complex, responsive layouts.

.grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.grid-item {
  background-color: #f0f0f0;
  padding: 20px;
}
Responsive Images
Using the srcset attribute to provide different image sizes for different devices.

<img srcset="small.jpg 500w, medium.jpg 1000w, large.jpg 2000w"
     sizes="(max-width: 600px) 500px, (max-width: 1200px) 1000px, 2000px"
     src="large.jpg" alt="Responsive Image">
Mobile-First Approach
Design for mobile devices first, then progressively enhance for larger screens.

/* Base styles for mobile */
.container {
  width: 100%;
  padding: 15px;
}

/* Tablet styles */
@media only screen and (min-width: 768px) {
  .container {
    width: 750px;
    margin: 0 auto;
  }
}

/* Desktop styles */
@media only screen and (min-width: 1024px) {
  .container {
    width: 960px;
  }
}

3. Experimentation with different CSS properties to achieve a pleasing design on all devices.

Bonus: Implement responsive typography using relative units like em or rem.
