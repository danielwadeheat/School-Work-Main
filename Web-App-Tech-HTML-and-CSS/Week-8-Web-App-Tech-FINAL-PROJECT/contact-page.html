<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Week 8 Contact Page</title>
    <meta name="description" content="Contact Daniel Wade Heatherly, Front-End Web Developer.">
    <meta name="keywords" content="school work, homework, web development, HTML, CSS, coding, contact page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-inner">
            <a class="skip-link" href="#main-content">Skip to main content</a>
            <img src="images/DWH_logo.png" alt="Logo with the initials DWH">
            <nav aria-label="Primary">
                <a href="index.html">Home</a>
                <a href="about-page.html">About</a>
                <a href="projects-page.html">Projects</a>
                <a href="resume-page.html">Resume</a>
                <a href="contact-page.html" aria-current="page">Contact</a>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <section class="contact" aria-labelledby="contact-title" role="region">
            <h2 id="contact-title">Contact Me</h2>
            <form aria-labelledby="contact-title">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" autocomplete="name" required placeholder="Your First and Last Name">

                <label for="phone">Phone:</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  inputmode="numeric"
                  autocomplete="tel"
                  pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                  title="Use the format 123-456-7890"
                  required
                  placeholder="123-456-7890">
                <span id="phone-help" class="sr-only">Use the format 123-456-7890</span>

                <label for="email">E-Mail:</label>
                <input type="email" id="email" name="email" autocomplete="email" required placeholder="Your E-Mail">

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required placeholder="What is on your mind?"></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <small>&copy 2025 Daniel Wade Heatherly. All rights reserved.</small>
        <small><a href="contact-page.html">Contact</a></small>
    </footer>

<!-- Matrix canvas JS must come above JS file link -->
<canvas id="matrix" aria-hidden="true"></canvas>

<!-- Your script comes last -->
<script src="script.js"></script>

</body>
</html>
