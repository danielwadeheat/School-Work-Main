<!--Week 1 Assignment 3: BASIC CONTACT FORM-->

<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
    <form action="form.html" method="post">
        <fieldset>
            <legend>Contact Form</legend>
        <input type="text" name="name" placeholder="Name">
            <label for="html">The most common thing you've been called</label><br>
        <input type="text" name="email" placeholder="Email">
            <label for="html">Your electronic mail username</label><br>
        <input type="text" name="phone" placeholder="Phone">
            <label for="html">The numbers that can be dialed to reach your primary electronic voice calling device</label><br>
        <textarea>Type?</textarea>
            <label for="html">Type any questions/concerns/comments about life that you have, to the left</label><br>
        <button>Submit</button>
            <label for="html">Press this button to the left, to submit your information</label>
        </fieldset>
    </form>
</body>

    1. Create a form using the <form> tag.
    2. Add text input fields using the <input> tag with different type attributes (e.g., text, email, password).
    3. Include radio buttons and checkboxes for selecting options.
    4. Add a text area for comments using the <textarea> tag.
    5. Include a submit button using the <input type="submit"> or <button> tag.
    6. Bonus: Add labels to each input using the <label> tag and organize the form with <fieldset> and <legend>.
