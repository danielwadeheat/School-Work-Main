<!--Week 7 Assigment 2: BUILDING A MOBILE-FIRST NAVIGATION MENU-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Week 7 Assignment 1</title>
  <meta name="description" content="This is my Francis Turtle Week 7 2st Assignment.">
  <meta name="keywords" content="school work, homework, web development, mobile-first, navigation menu, HTML, CSS, coding">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: 1rem;
    }

    nav {
      background-color: #333;
      color: white;
      position: relative;
      z-index: 2;
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background-color: #333;
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }

    .nav-toggle {
      background: none;
      border: none;
      cursor: pointer;
      width: 40px;
      height: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0;
      z-index: 3;
    }

    .nav-toggle span {
      display: block;
      height: 4px;
      width: 100%;
      background-color: white;
      border-radius: 2px;
      transition: transform 0.4s, opacity 0.4s;
    }

    .nav-toggle.open span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .nav-toggle.open span:nth-child(2) {
      opacity: 0;
    }

    .nav-toggle.open span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    .nav-links {
      max-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: #444;
      transition: max-height 0.4s ease-in-out;
    }

    .nav-links a {
      padding: 1rem;
      color: white;
      text-decoration: none;
      transition: background 0.3s;
    }

    .nav-links a:hover,
    .nav-links a:focus {
      background-color: #555;
    }

    .nav-links.show {
      max-height: 500px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .overlay.show {
      display: block;
      opacity: 1;
    }

    @media screen and (min-width: 768px) {
      .nav-toggle {
        display: none;
      }

      .nav-links {
        display: flex !important;
        flex-direction: row;
        background-color: transparent;
        max-height: none;
      }

      .nav-links a {
        padding: 0 1rem;
      }

      .overlay {
        display: none !important;
      }
    }
  </style>
</head>
<body>

<!-- Overlay -->
<div class="overlay" id="navOverlay" aria-hidden="true"></div>

<!-- Navigation -->
<nav role="navigation" aria-label="Main Navigation">
  <div class="nav-container">
    <div class="nav-logo">MySite</div>
    <button class="nav-toggle" aria-expanded="false" aria-controls="navMenu" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  <div class="nav-links" id="navMenu">
    <a href="#home" role="menuitem">Home</a>
    <a href="#about" role="menuitem">About</a>
    <a href="#services" role="menuitem">Services</a>
    <a href="#contact" role="menuitem">Contact</a>
  </div>
</nav>

<script>
  const toggle = document.querySelector('.nav-toggle');
  const menu = document.getElementById('navMenu');
  const overlay = document.getElementById('navOverlay');

  function toggleMenu() {
    const isOpen = toggle.classList.toggle('open');
    menu.classList.toggle('show');
    overlay.classList.toggle('show');
    toggle.setAttribute('aria-expanded', isOpen);
    overlay.setAttribute('aria-hidden', !isOpen);
  }

  toggle.addEventListener('click', toggleMenu);
  overlay.addEventListener('click', toggleMenu);
</script>

</body>
</html>
